<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">X Thread Reader</title>
  <desc id="desc">Export X and Twitter threads to Markdown.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f7f1df"/>
      <stop offset="100%" stop-color="#ead9b3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#122131" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1060" cy="90" r="150" fill="#d4472d" opacity="0.14"/>
  <circle cx="112" cy="530" r="180" fill="#697554" opacity="0.14"/>
  <g filter="url(#shadow)">
    <rect x="610" y="108" width="470" height="392" rx="34" fill="#fff9ee" stroke="#122131" stroke-opacity="0.08"/>
    <rect x="644" y="164" width="402" height="258" rx="24" fill="#122131"/>
    <text x="678" y="214" font-family="IBM Plex Mono, monospace" font-size="27" fill="#f3ecd8"># Why the best threads feel</text>
    <text x="678" y="258" font-family="IBM Plex Mono, monospace" font-size="27" fill="#f3ecd8">impossible to save cleanly</text>
    <text x="678" y="326" font-family="IBM Plex Mono, monospace" font-size="24" fill="#f3ecd8" opacity="0.78">- full thread capture</text>
    <text x="678" y="364" font-family="IBM Plex Mono, monospace" font-size="24" fill="#f3ecd8" opacity="0.78">- image links preserved</text>
    <text x="678" y="402" font-family="IBM Plex Mono, monospace" font-size="24" fill="#f3ecd8" opacity="0.78">- one-click Markdown export</text>
  </g>
  <text x="92" y="160" font-family="Georgia, serif" font-size="92" fill="#122131">X Thread Reader</text>
  <text x="92" y="248" font-family="IBM Plex Sans, Arial, sans-serif" font-size="38" fill="#122131" fill-opacity="0.72">Turn X/Twitter threads into clean Markdown archives.</text>
  <rect x="92" y="322" width="278" height="68" rx="34" fill="#d4472d"/>
  <text x="136" y="367" font-family="IBM Plex Sans, Arial, sans-serif" font-size="28" fill="#fff9ee">Local-only Chrome extension</text>
</svg>
