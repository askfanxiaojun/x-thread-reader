<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - X Thread Reader</title>
    <meta name="robots" content="noindex, follow" />
    <meta name="theme-color" content="#122131" />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/assets/favicon-32x32.png" type="image/png" sizes="32x32" />
    <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="X Thread Reader home">
          <span class="brand-mark">X</span>
          <span>
            X Thread Reader<br />
            <strong>Page not found</strong>
          </span>
        </a>
        <nav class="topnav" aria-label="Primary navigation">
          <a href="/">Home</a>
          <a href="/faq/">FAQ</a>
          <a href="/privacy/">Privacy</a>
          <a class="lang-link" href="/zh-cn/" lang="zh-CN">中文</a>
        </nav>
      </header>

      <main>
        <section class="page-hero">
          <span class="eyebrow">404</span>
          <h1>This page does not exist.</h1>
          <p>
            The URL you followed may be outdated or mistyped. Try one of the links below to get back on track.
          </p>
          <div class="hero-actions" style="margin-top: 28px">
            <a class="button" href="/">Back to homepage</a>
            <a class="button-secondary" href="/faq/">Read the FAQ</a>
          </div>
        </section>
      </main>

      <footer class="footer">
        <div class="footer-inner">
          <p class="footer-copy">X Thread Reader <span data-year></span></p>
          <div class="footer-links">
            <a href="/">Home</a>
            <a href="/faq/">FAQ</a>
            <a href="/privacy/">Privacy</a>
            <a href="https://github.com/askfanxiaojun/x-thread-reader" target="_blank" rel="noreferrer">GitHub</a>
          </div>
        </div>
      </footer>
    </div>
    <script src="/main.js" defer></script>
  </body>
</html>
